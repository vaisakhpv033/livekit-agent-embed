<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Customer Simulator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      background: linear-gradient(
        135deg,
        #020617 0%,
        #0f172a 50%,
        #111827 100%
      );

      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 32px;
    }

    .instruction { margin-top: 24px; display: inline-block; padding: 12px 18px; border-radius: 12px; background: rgba(37, 99, 235, 0.15); border: 1px solid rgba(37, 99, 235, 0.4); color: #93c5fd; font-size: 0.95rem; font-weight: 500; }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }

    p {
      color: #94a3b8;
      font-size: 1.1rem;
      font-weight: 400;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(37, 99, 235, 0.15);
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
    }

    .glow.left {
      top: -150px;
      left: -150px;
    }

    .glow.right {
      bottom: -150px;
      right: -150px;
    }
  </style>
</head>
<body>

  <div class="glow left"></div>
  <div class="glow right"></div>

  <div class="container"> <h1>Virtual Customer Simulator</h1> <p> Click the blue button in the bottom-right corner to start a conversation with the AI customer. </p> <div class="instruction"> ↓ Start your training call using the blue button in the bottom-right corner </div> </div>

  <script
  src="https://cloud.livekit.io/embed-popup.js"
  data-lk-agent="CA_LTkDLLyjmEub"
  data-lk-color="#002CF2"
></script>

</body>
</html>
